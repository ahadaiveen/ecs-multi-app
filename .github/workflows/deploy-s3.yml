name: Deploy S3 Service

on:
  push:
    paths:
      - 'flask-s3-service/**'
      - '.github/workflows/deploy-s3.yml'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t ecs-multi-s3-service ./flask-s3-service

      - name: Tag Docker Image
        run: |
          docker tag ecs-multi-s3-service:latest 255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/ecs-multi-s3-service:latest

      - name: Push Docker Image
        run: |
          docker push 255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/ecs-multi-s3-service:latest